<section id="contact" class="relative px-4 sm:px-6 lg:px-16 pt-15 sm:pt-20 lg:pt-10 pb-20 sm:pb-15 text-white overflow-hidden">

  <!-- BACKGROUND GLOW -->
  <div class="absolute top-[-120px] left-[-120px] w-[450px] h-[450px] rounded-full"></div>
  <div class="absolute bottom-[-120px] right-[-120px] w-[500px] h-[500px] rounded-full"></div>

  <div class="max-w-6xl mx-auto relative">

    <!-- HEADER -->
    <div class="text-center mb-16">
      <h2 class="text-4xl md:text-5xl font-semibold">Get In Touch</h2>
      <p class="text-zinc-400 mt-3">Let’s build something amazing together</p>
    </div>

    <!-- FORM WRAPPER -->
    <div class="grid md:grid-cols-2 gap-10 items-stretch">

      <!-- LEFT INFO CARD -->
      <div class="p-10 rounded-3xl bg-white/5 border border-white/10 backdrop-blur-2xl">
        <h3 class="text-2xl font-semibold mb-6">Contact Information</h3>

        <div class="space-y-6 text-zinc-300">
          <p>📍 Rahim Yar Khan (RYK), Punjab, Pakistan</p>
          <p>📧 sobiamushtaq033@gmail.com</p>
          <p>📞 +92 325 0048008</p>
        </div>

        <div class="mt-10 text-zinc-400 text-sm">
          Available for freelance work, Shopify projects, and full-stack development.
        </div>
      </div>

      <!-- FORM -->
      <div class="p-10 rounded-3xl bg-white/5 border border-white/10 backdrop-blur-2xl">

        <form class="space-y-6">

          <!-- NAME -->
          <div>
            <label class="text-sm text-zinc-400">Your Name</label>
            <input type="text"
              placeholder="Enter your name"
              class="w-full mt-2 p-4 rounded-xl bg-black/40 border border-white/10 focus:border-purple-500 outline-none transition">
          </div>

          <!-- EMAIL -->
          <div>
            <label class="text-sm text-zinc-400">Email Address</label>
            <input type="email"
              placeholder="Enter your email"
              class="w-full mt-2 p-4 rounded-xl bg-black/40 border border-white/10 focus:border-blue-500 outline-none transition">
          </div>

          <!-- MESSAGE -->
          <div>
            <label class="text-sm text-zinc-400">Message</label>
            <textarea rows="5"
              placeholder="Write your message..."
              class="w-full mt-2 p-4 rounded-xl bg-black/40 border border-white/10 focus:border-pink-500 outline-none transition"></textarea>
          </div>

          <!-- BUTTON -->
          <button
  type="submit"
  class="group relative w-full overflow-hidden rounded-2xl border border-white/10 bg-gradient-to-r from-purple-600 via-blue-600 to-pink-600 px-8 py-4 font-semibold tracking-wide text-white transition-all duration-500 hover:scale-[1.02] hover:shadow-[0_0_40px_rgba(168,85,247,0.45)]"
>

  <!-- GLOW EFFECT -->
  <span class="absolute inset-0 bg-white/10 opacity-0 transition duration-500 group-hover:opacity-100"></span>

  <!-- BUTTON CONTENT -->
  <span class="relative flex items-center justify-center gap-3">

    <!-- ICON -->
    <svg 
      xmlns="http://www.w3.org/2000/svg" 
      fill="none"
      viewBox="0 0 24 24"
      stroke-width="1.8"
      stroke="currentColor"
      class="w-5 h-5 transition-transform duration-500 group-hover:translate-x-1"
    >
      <path 
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M6 12 3 3l18 9-18 9 3-9Zm0 0h7.5"
      />
    </svg>

    <span class="text-[15px] uppercase tracking-[2px]">
      Send Message
    </span>

  </span>

</button>

        </form>
      </div>

    </div>
  </div>

</section>
